name: benchmarks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
  schedule:
    - cron: "00 05 * * 3"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  MC_IMAGE: quay.io/minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
  MINIO_IMAGE: quay.io/minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
  RUST_BACKTRACE: 1

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  micro:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
      - name: Run Criterion benches
        run: |
          rm -rf target/criterion
          cargo bench --locked -p holys3-index --bench hot_paths -- --quick --noplot --save-baseline pr
      - name: Collect Criterion medians
        run: |
          python3 <<'PY'
          import json
          from pathlib import Path

          root = Path("target/criterion")
          benchmarks = {}
          for path in root.rglob("estimates.json"):
              if path.parent.name != "new":
                  continue
              name = path.parent.parent.relative_to(root).as_posix()
              data = json.loads(path.read_text())
              benchmarks[name] = data["median"]["point_estimate"]
          Path("benches/current.json").write_text(json.dumps({"unit": "ns", "benchmarks": dict(sorted(benchmarks.items()))}, indent=2) + "\n")
          PY
      - name: Compare micro baseline
        run: |
          python3 <<'PY'
          import json
          import sys
          from pathlib import Path

          baseline = json.loads(Path("benches/baseline.json").read_text())
          current = json.loads(Path("benches/current.json").read_text())
          base = baseline["benchmarks"]
          rows = ["| benchmark | baseline ns | current ns | delta |", "|---|---:|---:|---:|"]
          failed = False
          for name in sorted(base.keys() - current["benchmarks"].keys()):
              rows.append(f"| {name} | {base[name]:.0f} | missing | missing |")
              failed = True
          for name, value in current["benchmarks"].items():
              if value <= 0:
                  raise SystemExit(f"benchmark {name} reported non-positive median {value}")
              if name not in base:
                  rows.append(f"| {name} | new | {value:.0f} | new |")
                  failed = True
                  continue
              old = base[name]
              delta = ((value - old) / old) * 100.0
              rows.append(f"| {name} | {old:.0f} | {value:.0f} | {delta:+.1f}% |")
          rows.extend(["", "| paired benchmark | hybrid/control | limit |", "|---|---:|---:|"])
          for windows in (128, 256, 512, 1024, 4096, 65_536):
              control_name = f"packed_sort_control_{windows}"
              hybrid_name = f"packed_sort_hybrid_{windows}"
              missing = [name for name in (control_name, hybrid_name) if name not in current["benchmarks"]]
              if missing:
                  rows.append(f"| packed sort {windows} | missing: {', '.join(missing)} | 1.150x |")
                  failed = True
                  continue
              control = current["benchmarks"][control_name]
              hybrid = current["benchmarks"][hybrid_name]
              ratio = hybrid / control
              rows.append(f"| packed sort {windows} | {ratio:.3f}x | 1.150x |")
              failed = failed or ratio > 1.15
          Path("bench-micro.md").write_text("\n".join(rows) + "\n")
          if failed:
              sys.exit(1)
          PY
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: bench-micro
          path: |
            bench-micro.md
            benches/current.json

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Start MinIO service
        run: |
          docker run -d --name holys3-minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            "$MINIO_IMAGE" server /data --address :9000
      - name: Create bucket
        env:
          MC_HOST_local: http://minioadmin:minioadmin@127.0.0.1:9000
        run: |
          attempts=0
          until docker run --rm --network host -e MC_HOST_local "$MC_IMAGE" ready local; do
            attempts=$((attempts + 1))
            test "$attempts" -lt 60
            sleep 1
          done
          docker run --rm --network host -e MC_HOST_local "$MC_IMAGE" mb --ignore-existing local/holys3-bench
      - name: Build benchmark binaries
        run: cargo build --locked --release -p holys3 -p holys3-bench
      - name: Run xbench
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          HOLYS3_BENCH_BUCKET: holys3-bench
          HOLYS3_BENCH_REGION: us-east-1
          HOLYS3_BENCH_ENDPOINT: http://127.0.0.1:9000
        run: |
          target/release/holys3-bench seed --seed 1 --objects 1000 --size 4096
          target/release/holys3-bench upload --target s3
          target/release/holys3-bench run --scenarios crates/xbench/scenarios/queries.toml --iterations 3 --warmup 1 --concurrency 64
          target/release/holys3-bench render --input crates/xbench/runs/latest.json > bench-e2e.md
      - name: Test large-object ranged fetch
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          MC_HOST_local: http://minioadmin:minioadmin@127.0.0.1:9000
        run: |
          truncate -s 536870912 bench-large.log
          printf RANGE_NEEDLE | dd of=bench-large.log bs=1 seek=268435456 conv=notrunc status=none
          docker run --rm --network host -e MC_HOST_local -v "$PWD/bench-large.log:/bench-large.log:ro" "$MC_IMAGE" cp /bench-large.log local/holys3-bench/range/large.log
          /usr/bin/time -v -o bench-s3-trigram-index.txt target/release/holys3 index s3://holys3-bench/range --region us-east-1 --endpoint http://127.0.0.1:9000 --concurrency 64
          /usr/bin/time -v -o bench-s3-trigram-search.txt target/release/holys3 -l RANGE_NEEDLE s3://holys3-bench/range --region us-east-1 --endpoint http://127.0.0.1:9000 --concurrency 64 > bench-s3-trigram-hits.txt
          test "$(wc -l < bench-s3-trigram-hits.txt)" -eq 1
          /usr/bin/time -v -o bench-s3-sparse-index.txt target/release/holys3 index s3://holys3-bench/range --region us-east-1 --endpoint http://127.0.0.1:9000 --concurrency 64 --strategy sparse --rebuild
          /usr/bin/time -v -o bench-s3-sparse-search.txt target/release/holys3 -l RANGE_NEEDLE s3://holys3-bench/range --region us-east-1 --endpoint http://127.0.0.1:9000 --concurrency 64 > bench-s3-sparse-hits.txt
          test "$(wc -l < bench-s3-sparse-hits.txt)" -eq 1
          python3 <<'PY'
          from pathlib import Path

          limit_kib = 96 * 1024
          for path in Path(".").glob("bench-s3-*.txt"):
              if path.name.endswith("-hits.txt"):
                  continue
              lines = path.read_text().splitlines()
              field = next(line for line in lines if "Maximum resident set size" in line)
              peak_kib = int(field.rsplit(":", 1)[1])
              if peak_kib > limit_kib:
                  raise SystemExit(f"{path}: peak RSS {peak_kib} KiB exceeds {limit_kib} KiB")
          PY
      - name: Test high-entropy compressed source
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          MC_HOST_local: http://minioadmin:minioadmin@127.0.0.1:9000
        run: |
          dd if=/dev/urandom of=bench-entropy.log bs=1048576 count=64 status=none
          printf ENTROPY_NEEDLE | dd of=bench-entropy.log bs=1 seek=33554432 conv=notrunc status=none
          gzip -1 -c bench-entropy.log > bench-entropy.log.gz
          docker run --rm --network host -e MC_HOST_local -v "$PWD/bench-entropy.log.gz:/bench-entropy.log.gz:ro" "$MC_IMAGE" cp /bench-entropy.log.gz local/holys3-bench/entropy/large.log.gz
          /usr/bin/time -v -o bench-entropy-index.txt target/release/holys3 index s3://holys3-bench/entropy --region us-east-1 --endpoint http://127.0.0.1:9000 --concurrency 64 --rebuild
          /usr/bin/time -v -o bench-entropy-search.txt target/release/holys3 -l ENTROPY_NEEDLE s3://holys3-bench/entropy --region us-east-1 --endpoint http://127.0.0.1:9000 --concurrency 64 > bench-entropy-hits.txt
          test "$(wc -l < bench-entropy-hits.txt)" -eq 1
          python3 <<'PY'
          from pathlib import Path

          limit_kib = 96 * 1024
          for name in ("bench-entropy-index.txt", "bench-entropy-search.txt"):
              lines = Path(name).read_text().splitlines()
              field = next(line for line in lines if "Maximum resident set size" in line)
              peak_kib = int(field.rsplit(":", 1)[1])
              if peak_kib > limit_kib:
                  raise SystemExit(f"{name}: peak RSS {peak_kib} KiB exceeds {limit_kib} KiB")
          PY
      - name: Stop MinIO
        if: always()
        run: docker rm --force holys3-minio
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: bench-e2e
          path: |
            bench-e2e.md
            bench-entropy-*.txt
            bench-s3-*.txt
            crates/xbench/runs/latest.json
          if-no-files-found: ignore

  scale:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
      - run: cargo build --locked --release -p holys3 -p holys3-bench
      - name: Profile 25,000-object index
        run: |
          target/release/holys3-bench seed --seed 1 --objects 25000 --size 4096
          /usr/bin/time -v -o bench-scale-index.txt target/release/holys3-bench upload --target dir | tee bench-scale-build.txt
          target/release/holys3-bench run --scenarios crates/xbench/scenarios/queries.toml --iterations 1 --warmup 0 --concurrency 64
          target/release/holys3-bench render --input crates/xbench/runs/latest.json > bench-scale.md
          cp crates/xbench/runs/latest.json bench-scale.json
      - name: Profile 256 MiB decoded workload
        run: |
          mkdir -p /tmp/holys3-large-data
          truncate -s 134217728 /tmp/holys3-large-data/large.log
          printf needle | dd of=/tmp/holys3-large-data/large.log bs=1 seek=67108864 conv=notrunc status=none
          gzip -c /tmp/holys3-large-data/large.log > /tmp/holys3-large-data/large.log.gz
          /usr/bin/time -v -o bench-scale-large.txt target/release/holys3 index /tmp/holys3-large-data --out /tmp/holys3-large-index
          hits=$(target/release/holys3 -l needle /tmp/holys3-large-data --index /tmp/holys3-large-index | wc -l)
          test "$hits" -eq 2
          /usr/bin/time -v -o bench-scale-sparse.txt target/release/holys3 index /tmp/holys3-large-data --out /tmp/holys3-large-sparse-index --strategy sparse
          hits=$(target/release/holys3 -l needle /tmp/holys3-large-data --index /tmp/holys3-large-sparse-index | wc -l)
          test "$hits" -eq 2
      - name: Profile 512 MiB compression expansion
        run: |
          mkdir -p /tmp/holys3-expansion-data
          truncate -s 536870912 /tmp/holys3-expansion-data/expanded.log
          printf EXPANSION_NEEDLE | dd of=/tmp/holys3-expansion-data/expanded.log bs=1 seek=268435456 conv=notrunc status=none
          gzip /tmp/holys3-expansion-data/expanded.log
          /usr/bin/time -v -o bench-expansion-index.txt target/release/holys3 index /tmp/holys3-expansion-data --out /tmp/holys3-expansion-index
          /usr/bin/time -v -o bench-expansion-search.txt target/release/holys3 -l EXPANSION_NEEDLE /tmp/holys3-expansion-data --index /tmp/holys3-expansion-index > bench-expansion-hits.txt
          test "$(wc -l < bench-expansion-hits.txt)" -eq 1
          /usr/bin/time -v -o bench-expansion-sparse-index.txt target/release/holys3 index /tmp/holys3-expansion-data --out /tmp/holys3-expansion-sparse-index --strategy sparse
          /usr/bin/time -v -o bench-expansion-sparse-search.txt target/release/holys3 -l EXPANSION_NEEDLE /tmp/holys3-expansion-data --index /tmp/holys3-expansion-sparse-index > bench-expansion-sparse-hits.txt
          test "$(wc -l < bench-expansion-sparse-hits.txt)" -eq 1
      - name: Enforce peak memory ceilings
        run: |
          python3 <<'PY'
          import re
          from pathlib import Path

          limit_kib = 300 * 1024
          for name in ("bench-scale-index.txt", "bench-scale-large.txt", "bench-scale-sparse.txt"):
              lines = Path(name).read_text().splitlines()
              field = next(line for line in lines if "Maximum resident set size" in line)
              peak_kib = int(field.rsplit(":", 1)[1])
              if peak_kib > limit_kib:
                  raise SystemExit(f"{name}: peak RSS {peak_kib} KiB exceeds {limit_kib} KiB")

          expansion_limit_kib = 96 * 1024
          for name in (
              "bench-expansion-index.txt",
              "bench-expansion-search.txt",
              "bench-expansion-sparse-index.txt",
              "bench-expansion-sparse-search.txt",
          ):
              lines = Path(name).read_text().splitlines()
              field = next(line for line in lines if "Maximum resident set size" in line)
              peak_kib = int(field.rsplit(":", 1)[1])
              if peak_kib > expansion_limit_kib:
                  raise SystemExit(f"{name}: peak RSS {peak_kib} KiB exceeds {expansion_limit_kib} KiB")

          output = Path("bench-scale-build.txt").read_text()
          match = re.search(r"listing_ms=([0-9.]+) build_ms=([0-9.]+)", output)
          if match is None:
              raise SystemExit("scale benchmark did not report listing_ms and build_ms")
          build_ms = float(match.group(2))
          build_limit_ms = 14_000
          if build_ms > build_limit_ms:
              raise SystemExit(f"25,000-object build took {build_ms:.3f} ms, exceeds {build_limit_ms} ms")
          PY
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: bench-scale
          path: |
            bench-scale.md
            bench-scale-index.txt
            bench-scale-build.txt
            bench-scale-large.txt
            bench-scale-sparse.txt
            bench-scale.json
            bench-expansion-index.txt
            bench-expansion-search.txt
            bench-expansion-hits.txt
            bench-expansion-sparse-index.txt
            bench-expansion-sparse-search.txt
            bench-expansion-sparse-hits.txt
          if-no-files-found: error

  benchmarks-success:
    name: benchmarks-success
    if: always()
    needs: [micro, e2e, scale]
    runs-on: ubuntu-latest
    steps:
      - name: Verify benchmark jobs passed
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: jq --exit-status 'all(.result == "success")' <<< "$NEEDS_JSON"

  pr-comment:
    if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    needs:
      - micro
      - e2e
      - scale
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          path: artifacts
          merge-multiple: true
      - name: Build PR comment
        run: |
          {
            echo '## holys3 benchmarks'
            echo
            echo '### micro'
            if [ -f artifacts/bench-micro.md ]; then cat artifacts/bench-micro.md; else echo 'micro did not produce a table'; fi
            echo
            echo '### e2e S3'
            if [ -f artifacts/bench-e2e.md ]; then cat artifacts/bench-e2e.md; else echo 'e2e did not produce a table'; fi
            echo
            echo '### scale'
            if [ -f artifacts/bench-scale.md ]; then cat artifacts/bench-scale.md; else echo 'scale did not produce a table'; fi
          } > bench-comment.md
      - uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: holys3-benchmarks
          path: bench-comment.md
