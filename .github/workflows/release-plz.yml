name: release-plz

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: {}

jobs:
  # Keeps an open release PR (version bumps + CHANGELOG) up to date.
  release-plz-pr:
    name: release-plz PR
    if: vars.RELEASE_PLZ_PR_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.1
      - name: Run release-plz
        id: release-pr
        uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - name: Run CI on release branches
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          RELEASE_PRS: ${{ steps.release-pr.outputs.prs }}
        run: |
          jq -r '.[].head_branch' <<< "$RELEASE_PRS" | while read -r branch; do
            gh workflow run ci.yml --ref "$branch"
          done

  verify:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --locked --release --workspace --all-features
      - run: cargo package --locked --workspace

  release-plz-release:
    name: release-plz release
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    environment: crates-io
    outputs:
      releases: ${{ steps.release.outputs.releases }}
      releases_created: ${{ steps.release.outputs.releases_created }}
      release_tag: ${{ steps.release-tag.outputs.tag }}
    permissions:
      contents: write
      id-token: write
      pull-requests: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.1
      - name: Run release-plz
        id: release
        uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # crates.io has no Trusted Publishing config for this repo, so
          # publishing authenticates with the environment-scoped token.
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Select release tag
        id: release-tag
        if: steps.release.outputs.releases_created == 'true'
        env:
          RELEASES: ${{ steps.release.outputs.releases }}
        run: |
          tag="$(jq -r 'first(.[] | select(.package_name == "seagrep") | .tag) // empty' <<< "$RELEASES")"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  release-assets:
    if: needs.release-plz-release.outputs.release_tag != ''
    needs: release-plz-release
    permissions:
      attestations: write
      contents: write
      id-token: write
    uses: ./.github/workflows/release-assets.yml
    with:
      tag: ${{ needs.release-plz-release.outputs.release_tag }}
