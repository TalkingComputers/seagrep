name: release

# Tags come from release-plz (git_tag_name = "v{ version }") or a manual
# `git tag vX.Y.Z && git push --tags`.
on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          # macos-13 (the Intel runner) is retired; arm64 macOS cross-compiles
          # x86_64-apple-darwin natively via the toolchain target.
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      # Archive names (holys3-<target>.tar.gz) match cargo-binstall's default
      # pkg-url template under v{version} tags: `cargo binstall holys3` works
      # with no extra metadata.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: holys3
          target: ${{ matrix.target }}
          tar: unix
          zip: windows
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
