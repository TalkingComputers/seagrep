version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: scope
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch
      cargo-major:
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns:
          - "*"
