name: benchmarks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
  schedule:
    - cron: "00 05 * * 3"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  MC_IMAGE: quay.io/minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
  MINIO_IMAGE: quay.io/minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
  RUST_BACKTRACE: 1

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  micro:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Checkout benchmark base
        if: github.event_name == 'pull_request'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: benchmark-base
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
      - name: Clear Criterion results
        run: rm -rf target/criterion
      - name: Run base Criterion benches
        if: github.event_name == 'pull_request'
        working-directory: benchmark-base
        run: cargo bench --locked -p holys3-index --bench hot_paths -- --noplot --save-baseline pull-request-base
      - name: Import base baselines
        if: github.event_name == 'pull_request'
        # The base build gets its own target dir so its artifacts can never
        # satisfy PR compilation units (a shared dir let a stale
        # holys3-core rlib shadow the PR's when the public API changed);
        # only the Criterion baselines cross over.
        run: |
          mkdir -p target/criterion
          cp -R benchmark-base/target/criterion/. target/criterion/
          rm -rf target/criterion/*/new target/criterion/*/change target/criterion/*/report
      - name: Run Criterion benches against PR base
        if: github.event_name == 'pull_request'
        run: cargo bench --locked -p holys3-index --bench hot_paths -- --noplot --baseline-lenient pull-request-base
      - name: Run Criterion benches
        if: github.event_name != 'pull_request'
        run: |
          cargo bench --locked -p holys3-index --bench hot_paths -- --noplot --save-baseline pr
      - name: Collect Criterion medians
        run: |
          python3 <<'PY'
          import json
          from pathlib import Path

          root = Path("target/criterion")
          benchmarks = {}
          for path in root.rglob("estimates.json"):
              if path.parent.name != "new":
                  continue
              name = path.parent.parent.relative_to(root).as_posix()
              data = json.loads(path.read_text())
              benchmarks[name] = data["median"]["point_estimate"]
          Path("benches/current.json").write_text(json.dumps({"unit": "ns", "benchmarks": dict(sorted(benchmarks.items()))}, indent=2) + "\n")
          PY
      - name: Compare micro baseline
        run: |
          python3 <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          regression_limit = 0.20
          root = Path("target/criterion")
          baseline = json.loads(Path("benches/baseline.json").read_text())
          current = json.loads(Path("benches/current.json").read_text())
          base = baseline["benchmarks"]
          rows = ["| benchmark | baseline ns | current ns | delta |", "|---|---:|---:|---:|"]
          failed = False
          for name in sorted(base.keys() - current["benchmarks"].keys()):
              rows.append(f"| {name} | {base[name]:.0f} | missing | missing |")
              failed = True
          for name, value in current["benchmarks"].items():
              if value <= 0:
                  raise SystemExit(f"benchmark {name} reported non-positive median {value}")
              if name not in base:
                  rows.append(f"| {name} | new | {value:.0f} | new |")
                  failed = True
                  continue
              old = base[name]
              delta = ((value - old) / old) * 100.0
              rows.append(f"| {name} | {old:.0f} | {value:.0f} | {delta:+.1f}% |")
          rows.extend(["", "| paired benchmark | hybrid/control | limit |", "|---|---:|---:|"])
          for windows in (128, 256, 512, 1024, 4096, 65_536):
              control_name = f"packed_sort_control_{windows}"
              hybrid_name = f"packed_sort_hybrid_{windows}"
              missing = [name for name in (control_name, hybrid_name) if name not in current["benchmarks"]]
              if missing:
                  rows.append(f"| packed sort {windows} | missing: {', '.join(missing)} | 1.150x |")
                  failed = True
                  continue
              control = current["benchmarks"][control_name]
              hybrid = current["benchmarks"][hybrid_name]
              ratio = hybrid / control
              rows.append(f"| packed sort {windows} | {ratio:.3f}x | 1.150x |")
              failed = failed or ratio > 1.15
          if os.environ["GITHUB_EVENT_NAME"] == "pull_request":
              changes = []
              for path in root.rglob("change/estimates.json"):
                  name = path.parent.parent.relative_to(root).as_posix()
                  estimate = json.loads(path.read_text())["median"]
                  interval = estimate["confidence_interval"]
                  changes.append((name, interval["lower_bound"], estimate["point_estimate"], interval["upper_bound"]))
              if not changes:
                  raise SystemExit("Criterion produced no PR-base comparisons")
              rows.extend(["", "| benchmark vs PR base | median delta | 95% CI | limit |", "|---|---:|---:|---:|"])
              for name, lower, point, upper in sorted(changes):
                  # packed_sort benches are gated on their same-run paired
                  # ratio above: their absolute deltas flap on noisy runners
                  # (issue #32, six documented instances) while the ratio
                  # stays sane, so they are reported here but not gated.
                  paired = name.startswith("packed_sort_")
                  limit_label = "paired" if paired else f"+{regression_limit:.0%}"
                  rows.append(f"| {name} | {point:+.1%} | {lower:+.1%} to {upper:+.1%} | {limit_label} |")
                  failed = failed or (not paired and lower > regression_limit)
          Path("bench-micro.md").write_text("\n".join(rows) + "\n")
          if failed:
              sys.exit(1)
          PY
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: bench-micro
          path: |
            bench-micro.md
            benches/current.json

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Start MinIO service
        run: |
          docker run -d --name holys3-minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            "$MINIO_IMAGE" server /data --address :9000
      - name: Create buckets
        env:
          MC_HOST_local: http://minioadmin:minioadmin@127.0.0.1:9000
        run: |
          attempts=0
          until docker run --rm --network host -e MC_HOST_local "$MC_IMAGE" ready local; do
            attempts=$((attempts + 1))
            test "$attempts" -lt 60
            sleep 1
          done
          docker run --rm --network host -e MC_HOST_local "$MC_IMAGE" mb --ignore-existing local/holys3-bench
          docker run --rm --network host -e MC_HOST_local "$MC_IMAGE" mb --ignore-existing local/holys3-index
      - name: Build benchmark binaries
        run: cargo build --locked --release -p holys3 -p holys3-bench
      - name: Run xbench
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          HOLYS3_BENCH_BUCKET: holys3-bench
          HOLYS3_BENCH_REGION: us-east-1
          HOLYS3_BENCH_ENDPOINT: http://127.0.0.1:9000
        run: |
          target/release/holys3-bench seed --seed 1 --objects 1000 --size 4096
          target/release/holys3-bench upload --target s3
          target/release/holys3-bench run --scenarios crates/xbench/scenarios/queries.toml --iterations 3 --warmup 1 --concurrency 64
          target/release/holys3-bench render --input crates/xbench/runs/latest.json > bench-e2e.md
      - name: Test independent index bucket
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          MC_HOST_local: http://minioadmin:minioadmin@127.0.0.1:9000
        run: |
          source_index_keys=$(docker run --rm --network host -e MC_HOST_local "$MC_IMAGE" ls --recursive --json local/holys3-bench/xbench/.holys3 | wc -l)
          target/release/holys3 index s3://holys3-bench/xbench --region us-east-1 --endpoint http://127.0.0.1:9000 --index s3://holys3-index/xbench --index-region us-east-1 --index-endpoint http://127.0.0.1:9000 --concurrency 64 --rebuild --strategy trigram
          target/release/holys3 -l longliteralbenchmarktoken s3://holys3-bench/xbench --region us-east-1 --endpoint http://127.0.0.1:9000 --index s3://holys3-index/xbench --index-region us-east-1 --index-endpoint http://127.0.0.1:9000 --concurrency 64 > bench-independent-index-hits.txt
          test "$(wc -l < bench-independent-index-hits.txt)" -eq 334
          if target/release/holys3 -q longliteralbenchmarktoken s3://holys3-bench/xbench/missing --region us-east-1 --endpoint http://127.0.0.1:9000 --index s3://holys3-index/xbench --index-region us-east-1 --index-endpoint http://127.0.0.1:9000 --concurrency 64; then exit 1; else test "$?" -eq 1; fi
          if target/release/holys3 -q longliteralbenchmarktoken s3://holys3-bench --region us-east-1 --endpoint http://127.0.0.1:9000 --index s3://holys3-index/xbench --index-region us-east-1 --index-endpoint http://127.0.0.1:9000 --concurrency 64; then exit 1; else test "$?" -eq 2; fi
          test "$(docker run --rm --network host -e MC_HOST_local "$MC_IMAGE" ls --recursive --json local/holys3-bench/xbench/.holys3 | wc -l)" -eq "$source_index_keys"
          docker run --rm --network host -e MC_HOST_local "$MC_IMAGE" rm --recursive --force local/holys3-bench/xbench
          target/release/holys3 -l longliteralbenchmarktoken s3://holys3-bench/xbench --region us-east-1 --endpoint http://127.0.0.1:9000 --index s3://holys3-index/xbench --index-region us-east-1 --index-endpoint http://127.0.0.1:9000 --concurrency 64 > bench-source-deleted-hits.txt
          test "$(wc -l < bench-source-deleted-hits.txt)" -eq 334
      - name: Test large-object ranged fetch
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          MC_HOST_local: http://minioadmin:minioadmin@127.0.0.1:9000
        run: |
          truncate -s 536870912 bench-large.log
          printf RANGE_NEEDLE | dd of=bench-large.log bs=1 seek=268435456 conv=notrunc status=none
          docker run --rm --network host -e MC_HOST_local -v "$PWD/bench-large.log:/bench-large.log:ro" "$MC_IMAGE" cp /bench-large.log local/holys3-bench/range/large.log
          /usr/bin/time -v -o bench-s3-trigram-index.txt target/release/holys3 index s3://holys3-bench/range --region us-east-1 --endpoint http://127.0.0.1:9000 --concurrency 64 --strategy trigram
          /usr/bin/time -v -o bench-s3-trigram-search.txt target/release/holys3 -l RANGE_NEEDLE s3://holys3-bench/range --region us-east-1 --endpoint http://127.0.0.1:9000 --concurrency 64 > bench-s3-trigram-hits.txt
          test "$(wc -l < bench-s3-trigram-hits.txt)" -eq 1
          /usr/bin/time -v -o bench-s3-sparse-index.txt target/release/holys3 index s3://holys3-bench/range --region us-east-1 --endpoint http://127.0.0.1:9000 --concurrency 64 --strategy sparse --rebuild
          /usr/bin/time -v -o bench-s3-sparse-search.txt target/release/holys3 -l RANGE_NEEDLE s3://holys3-bench/range --region us-east-1 --endpoint http://127.0.0.1:9000 --concurrency 64 > bench-s3-sparse-hits.txt
          test "$(wc -l < bench-s3-sparse-hits.txt)" -eq 1
          python3 <<'PY'
          from pathlib import Path

          limit_kib = 96 * 1024
          for path in Path(".").glob("bench-s3-*.txt"):
              if path.name.endswith("-hits.txt"):
                  continue
              lines = path.read_text().splitlines()
              field = next(line for line in lines if "Maximum resident set size" in line)
              peak_kib = int(field.rsplit(":", 1)[1])
              if peak_kib > limit_kib:
                  raise SystemExit(f"{path}: peak RSS {peak_kib} KiB exceeds {limit_kib} KiB")
          PY
      - name: Test high-entropy compressed source
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          MC_HOST_local: http://minioadmin:minioadmin@127.0.0.1:9000
        run: |
          dd if=/dev/urandom of=bench-entropy.log bs=1048576 count=64 status=none
          printf ENTROPY_NEEDLE | dd of=bench-entropy.log bs=1 seek=33554432 conv=notrunc status=none
          gzip -1 -c bench-entropy.log > bench-entropy.log.gz
          docker run --rm --network host -e MC_HOST_local -v "$PWD/bench-entropy.log.gz:/bench-entropy.log.gz:ro" "$MC_IMAGE" cp /bench-entropy.log.gz local/holys3-bench/entropy/large.log.gz
          /usr/bin/time -v -o bench-entropy-index.txt target/release/holys3 index s3://holys3-bench/entropy --region us-east-1 --endpoint http://127.0.0.1:9000 --concurrency 64 --rebuild --strategy trigram
          /usr/bin/time -v -o bench-entropy-search.txt target/release/holys3 -l ENTROPY_NEEDLE s3://holys3-bench/entropy --region us-east-1 --endpoint http://127.0.0.1:9000 --concurrency 64 > bench-entropy-hits.txt
          test "$(wc -l < bench-entropy-hits.txt)" -eq 1
          python3 <<'PY'
          from pathlib import Path

          limit_kib = 112 * 1024
          for name in ("bench-entropy-index.txt", "bench-entropy-search.txt"):
              lines = Path(name).read_text().splitlines()
              field = next(line for line in lines if "Maximum resident set size" in line)
              peak_kib = int(field.rsplit(":", 1)[1])
              if peak_kib > limit_kib:
                  raise SystemExit(f"{name}: peak RSS {peak_kib} KiB exceeds {limit_kib} KiB")
          PY
      - name: Stop MinIO
        if: always()
        run: docker rm --force holys3-minio
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: bench-e2e
          path: |
            bench-e2e.md
            bench-entropy-*.txt
            bench-independent-index-hits.txt
            bench-source-deleted-hits.txt
            bench-s3-*.txt
            crates/xbench/runs/latest.json
          if-no-files-found: ignore

  scale:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
      - run: cargo build --locked --release -p holys3 -p holys3-bench
      - name: Profile 25,000-object index
        run: |
          target/release/holys3-bench seed --seed 1 --objects 25000 --size 4096
          /usr/bin/time -v -o bench-scale-index.txt target/release/holys3-bench upload --target dir | tee bench-scale-build.txt
          target/release/holys3-bench run --scenarios crates/xbench/scenarios/queries.toml --iterations 1 --warmup 0 --concurrency 64
          target/release/holys3-bench render --input crates/xbench/runs/latest.json > bench-scale.md
          cp crates/xbench/runs/latest.json bench-scale.json
      - name: Profile incremental churn
        run: |
          /usr/bin/time -v -o bench-churn-rss.txt target/release/holys3-bench churn --cycles 30 --changes 250 | tee bench-churn.txt
          cp crates/xbench/runs/churn.json bench-churn.json
      - name: Profile prose corpus (trigram vs sparse)
        run: |
          target/release/holys3-bench seed --seed 1 --objects 1000 --size 65536 --corpus prose
          target/release/holys3-bench upload --target dir
          target/release/holys3-bench run --scenarios crates/xbench/scenarios/prose.toml --iterations 1 --warmup 0 --concurrency 64
          cp crates/xbench/runs/latest.json bench-prose-trigram.json
          target/release/holys3-bench upload --target dir --strategy sparse
          target/release/holys3-bench run --scenarios crates/xbench/scenarios/prose.toml --iterations 1 --warmup 0 --concurrency 64
          cp crates/xbench/runs/latest.json bench-prose-sparse.json
          {
            echo '#### prose corpus, trigram'
            target/release/holys3-bench render --input bench-prose-trigram.json
            echo
            echo '#### prose corpus, sparse'
            target/release/holys3-bench render --input bench-prose-sparse.json
          } > bench-prose.md
      - name: Gate prose candidate counts
        run: |
          python3 <<'PY'
          import json
          from pathlib import Path

          def scenarios(name):
              summary = json.loads(Path(name).read_text())
              return {scenario["name"]: scenario for scenario in summary["scenarios"]}

          trigram = scenarios("bench-prose-trigram.json")
          sparse = scenarios("bench-prose-sparse.json")
          failures = []

          def gate(strategy, name, key, low, high):
              value = strategy[name][key]
              if not low <= value <= high:
                  failures.append(f"{name} {key} {value} outside [{low}, {high}]")

          # Phrase queries built from common words: trigram pruning must still
          # exhibit the prose collapse (candidates ~= every doc) while the
          # sparse dictionary must stay near-exact. Deterministic given seed=1.
          for name in ("planted_phrase", "unplanted_phrase"):
              gate(trigram, name, "prune_ratio", 0.9, 1.0)
              gate(sparse, name, "prune_ratio", 0.0, 0.03)
          gate(trigram, "rare_word", "prune_ratio", 0.0, 0.01)
          gate(sparse, "rare_word", "prune_ratio", 0.0, 0.01)
          gate(trigram, "common_word", "prune_ratio", 0.9, 1.0)
          gate(sparse, "common_word", "prune_ratio", 0.9, 1.0)
          for name, scenario in sparse.items():
              if scenario["hits"] != trigram[name]["hits"]:
                  failures.append(f"{name} hits diverge between strategies")
          if failures:
              raise SystemExit("\n".join(failures))
          PY
      - name: Start MinIO service
        run: |
          docker run -d --name holys3-scale-minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            "$MINIO_IMAGE" server /data --address :9000
      - name: Create scale buckets
        env:
          MC_HOST_local: http://minioadmin:minioadmin@127.0.0.1:9000
        run: |
          attempts=0
          until docker run --rm --network host -e MC_HOST_local "$MC_IMAGE" ready local; do
            attempts=$((attempts + 1))
            test "$attempts" -lt 60
            sleep 1
          done
          docker run --rm --network host -e MC_HOST_local "$MC_IMAGE" mb --ignore-existing local/holys3-scale
          docker run --rm --network host -e MC_HOST_local "$MC_IMAGE" mb --ignore-existing local/holys3-scale-index
      - name: Profile 256 MiB decoded workload
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          MC_HOST_local: http://minioadmin:minioadmin@127.0.0.1:9000
        run: |
          mkdir -p /tmp/holys3-large-data
          truncate -s 134217728 /tmp/holys3-large-data/large.log
          printf needle | dd of=/tmp/holys3-large-data/large.log bs=1 seek=67108864 conv=notrunc status=none
          gzip -c /tmp/holys3-large-data/large.log > /tmp/holys3-large-data/large.log.gz
          docker run --rm --network host -e MC_HOST_local -v /tmp/holys3-large-data:/data:ro "$MC_IMAGE" cp --recursive /data/ local/holys3-scale/large/
          /usr/bin/time -v -o bench-scale-large.txt target/release/holys3 index s3://holys3-scale/large --region us-east-1 --endpoint http://127.0.0.1:9000 --index s3://holys3-scale-index/large-trigram --index-region us-east-1 --index-endpoint http://127.0.0.1:9000 --concurrency 64 --strategy trigram
          hits=$(target/release/holys3 -l needle s3://holys3-scale/large --region us-east-1 --endpoint http://127.0.0.1:9000 --index s3://holys3-scale-index/large-trigram --index-region us-east-1 --index-endpoint http://127.0.0.1:9000 --concurrency 64 | wc -l)
          test "$hits" -eq 2
          /usr/bin/time -v -o bench-scale-sparse.txt target/release/holys3 index s3://holys3-scale/large --region us-east-1 --endpoint http://127.0.0.1:9000 --index s3://holys3-scale-index/large-sparse --index-region us-east-1 --index-endpoint http://127.0.0.1:9000 --concurrency 64 --strategy sparse
          hits=$(target/release/holys3 -l needle s3://holys3-scale/large --region us-east-1 --endpoint http://127.0.0.1:9000 --index s3://holys3-scale-index/large-sparse --index-region us-east-1 --index-endpoint http://127.0.0.1:9000 --concurrency 64 | wc -l)
          test "$hits" -eq 2
      - name: Profile 512 MiB compression expansion
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          MC_HOST_local: http://minioadmin:minioadmin@127.0.0.1:9000
        run: |
          mkdir -p /tmp/holys3-expansion-data
          truncate -s 536870912 /tmp/holys3-expansion-data/expanded.log
          printf EXPANSION_NEEDLE | dd of=/tmp/holys3-expansion-data/expanded.log bs=1 seek=268435456 conv=notrunc status=none
          gzip /tmp/holys3-expansion-data/expanded.log
          docker run --rm --network host -e MC_HOST_local -v /tmp/holys3-expansion-data:/data:ro "$MC_IMAGE" cp --recursive /data/ local/holys3-scale/expansion/
          /usr/bin/time -v -o bench-expansion-index.txt target/release/holys3 index s3://holys3-scale/expansion --region us-east-1 --endpoint http://127.0.0.1:9000 --index s3://holys3-scale-index/expansion-trigram --index-region us-east-1 --index-endpoint http://127.0.0.1:9000 --concurrency 64 --strategy trigram
          /usr/bin/time -v -o bench-expansion-search.txt target/release/holys3 -l EXPANSION_NEEDLE s3://holys3-scale/expansion --region us-east-1 --endpoint http://127.0.0.1:9000 --index s3://holys3-scale-index/expansion-trigram --index-region us-east-1 --index-endpoint http://127.0.0.1:9000 --concurrency 64 > bench-expansion-hits.txt
          test "$(wc -l < bench-expansion-hits.txt)" -eq 1
          /usr/bin/time -v -o bench-expansion-sparse-index.txt target/release/holys3 index s3://holys3-scale/expansion --region us-east-1 --endpoint http://127.0.0.1:9000 --index s3://holys3-scale-index/expansion-sparse --index-region us-east-1 --index-endpoint http://127.0.0.1:9000 --concurrency 64 --strategy sparse
          /usr/bin/time -v -o bench-expansion-sparse-search.txt target/release/holys3 -l EXPANSION_NEEDLE s3://holys3-scale/expansion --region us-east-1 --endpoint http://127.0.0.1:9000 --index s3://holys3-scale-index/expansion-sparse --index-region us-east-1 --index-endpoint http://127.0.0.1:9000 --concurrency 64 > bench-expansion-sparse-hits.txt
          test "$(wc -l < bench-expansion-sparse-hits.txt)" -eq 1
      - name: Profile 20,000-member TAR snapshot
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          MC_HOST_local: http://minioadmin:minioadmin@127.0.0.1:9000
        run: |
          python3 <<'PY'
          import io
          import tarfile
          from pathlib import Path

          root = Path("/tmp/holys3-archive-data")
          root.mkdir()
          size = 32 * 1024
          body = bytearray(b"x" * size)
          with tarfile.open(root / "members.tar", "w") as archive:
              for index in range(20_000):
                  body[:64] = f"member={index:05} ".encode().ljust(64, b"x")
                  body[128:142] = b"ARCHIVE_NEEDLE" if index % 1_000 == 0 else b"ordinary_value"
                  member = tarfile.TarInfo(f"logs/member-{index:05}.log")
                  member.size = size
                  member.mode = 0o600
                  archive.addfile(member, io.BytesIO(body))
          PY
          docker run --rm --network host -e MC_HOST_local -v /tmp/holys3-archive-data:/data:ro "$MC_IMAGE" cp /data/members.tar local/holys3-scale/archive/members.tar
          /usr/bin/time -v -o bench-archive-sparse-index.txt target/release/holys3 index s3://holys3-scale/archive --region us-east-1 --endpoint http://127.0.0.1:9000 --index s3://holys3-scale-index/archive-sparse --index-region us-east-1 --index-endpoint http://127.0.0.1:9000 --concurrency 64 --strategy sparse
          docker run --rm --network host -e MC_HOST_local "$MC_IMAGE" rm --recursive --force local/holys3-scale/archive
          target/release/holys3 -l ARCHIVE_NEEDLE s3://holys3-scale/archive --region us-east-1 --endpoint http://127.0.0.1:9000 --index s3://holys3-scale-index/archive-sparse --index-region us-east-1 --index-endpoint http://127.0.0.1:9000 --concurrency 64 > bench-archive-source-deleted-hits.txt
          test "$(wc -l < bench-archive-source-deleted-hits.txt)" -eq 20
      - name: Enforce peak memory ceilings
        run: |
          python3 <<'PY'
          import json
          import math
          import re
          from pathlib import Path

          limit_kib = 300 * 1024
          for name in (
              "bench-scale-index.txt",
              "bench-scale-large.txt",
              "bench-scale-sparse.txt",
              "bench-churn-rss.txt",
          ):
              lines = Path(name).read_text().splitlines()
              field = next(line for line in lines if "Maximum resident set size" in line)
              peak_kib = int(field.rsplit(":", 1)[1])
              if peak_kib > limit_kib:
                  raise SystemExit(f"{name}: peak RSS {peak_kib} KiB exceeds {limit_kib} KiB")

          expansion_limit_kib = 96 * 1024
          for name in (
              "bench-expansion-index.txt",
              "bench-expansion-search.txt",
              "bench-expansion-sparse-index.txt",
              "bench-expansion-sparse-search.txt",
          ):
              lines = Path(name).read_text().splitlines()
              field = next(line for line in lines if "Maximum resident set size" in line)
              peak_kib = int(field.rsplit(":", 1)[1])
              if peak_kib > expansion_limit_kib:
                  raise SystemExit(f"{name}: peak RSS {peak_kib} KiB exceeds {expansion_limit_kib} KiB")

          # 160 MiB: parallel sparse run writing (#43) plus streamed multipart
          # uploads (#44, 16 MiB parts with a bounded in-flight window) sit at
          # ~128 MiB peak; the old 128 MiB ceiling left sub-1% headroom and
          # tripped on run-to-run noise (131,572 KiB observed on a docs-only
          # PR).
          archive_limit_kib = 160 * 1024
          lines = Path("bench-archive-sparse-index.txt").read_text().splitlines()
          field = next(line for line in lines if "Maximum resident set size" in line)
          peak_kib = int(field.rsplit(":", 1)[1])
          if peak_kib > archive_limit_kib:
              raise SystemExit(f"bench-archive-sparse-index.txt: peak RSS {peak_kib} KiB exceeds {archive_limit_kib} KiB")

          output = Path("bench-scale-build.txt").read_text()
          match = re.search(r"listing_ms=([0-9.]+) build_ms=([0-9.]+)", output)
          if match is None:
              raise SystemExit("scale benchmark did not report listing_ms and build_ms")
          build_ms = float(match.group(2))
          build_limit_ms = 14_000
          if build_ms > build_limit_ms:
              raise SystemExit(f"25,000-object build took {build_ms:.3f} ms, exceeds {build_limit_ms} ms")

          churn = json.loads(Path("bench-churn.json").read_text())
          expected_fields = {
              "cycles",
              "changes_per_cycle",
              "total_docs",
              "listing_p50_ms",
              "listing_p95_ms",
              "update_p50_ms",
              "update_p95_ms",
              "update_max_ms",
              "pack_bytes_written",
              "final_segments",
          }
          if set(churn) != expected_fields:
              raise SystemExit(f"churn summary fields are {sorted(churn)}, expected {sorted(expected_fields)}")
          for name, expected in (
              ("cycles", 30),
              ("changes_per_cycle", 250),
              ("total_docs", 25_000),
          ):
              value = churn[name]
              if isinstance(value, bool) or not isinstance(value, int) or value != expected:
                  raise SystemExit(f"churn {name} is {value!r}, expected {expected}")
          for name in (
              "listing_p50_ms",
              "listing_p95_ms",
              "update_p50_ms",
              "update_p95_ms",
              "update_max_ms",
          ):
              value = churn[name]
              if isinstance(value, bool) or not isinstance(value, (int, float)) or not math.isfinite(value) or value <= 0:
                  raise SystemExit(f"churn {name} must be a positive finite number, got {value!r}")
          if churn["listing_p95_ms"] > 2_000:
              raise SystemExit(f"churn listing p95 {churn['listing_p95_ms']:.3f} ms exceeds 2000 ms")
          if churn["update_p50_ms"] > 500:
              raise SystemExit(f"churn update p50 {churn['update_p50_ms']:.3f} ms exceeds 500 ms")
          if churn["update_p95_ms"] > 1_500:
              raise SystemExit(f"churn update p95 {churn['update_p95_ms']:.3f} ms exceeds 1500 ms")
          if churn["update_max_ms"] > 6_000:
              raise SystemExit(f"churn update max {churn['update_max_ms']:.3f} ms exceeds 6000 ms")
          pack_bytes_written = churn["pack_bytes_written"]
          if isinstance(pack_bytes_written, bool) or not isinstance(pack_bytes_written, int) or pack_bytes_written <= 0:
              raise SystemExit(f"churn pack_bytes_written must be a positive integer, got {pack_bytes_written!r}")
          if pack_bytes_written > 300 * 1024 * 1024:
              raise SystemExit(f"churn wrote {pack_bytes_written} pack bytes, exceeds 300 MiB")
          final_segments = churn["final_segments"]
          if isinstance(final_segments, bool) or not isinstance(final_segments, int) or final_segments <= 0:
              raise SystemExit(f"churn final_segments must be a positive integer, got {final_segments!r}")
          PY
      - name: Stop MinIO
        if: always()
        run: docker rm --force holys3-scale-minio
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: bench-scale
          path: |
            bench-scale.md
            bench-prose.md
            bench-prose-trigram.json
            bench-prose-sparse.json
            bench-scale-index.txt
            bench-scale-build.txt
            bench-scale-large.txt
            bench-scale-sparse.txt
            bench-scale.json
            bench-churn.txt
            bench-churn-rss.txt
            bench-churn.json
            bench-expansion-index.txt
            bench-expansion-search.txt
            bench-expansion-hits.txt
            bench-expansion-sparse-index.txt
            bench-expansion-sparse-search.txt
            bench-expansion-sparse-hits.txt
            bench-archive-sparse-index.txt
            bench-archive-source-deleted-hits.txt
          if-no-files-found: error

  benchmarks-success:
    name: benchmarks-success
    if: always()
    needs: [micro, e2e, scale]
    runs-on: ubuntu-latest
    steps:
      - name: Verify benchmark jobs passed
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: jq --exit-status 'all(.result == "success")' <<< "$NEEDS_JSON"

  pr-comment:
    if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    needs:
      - micro
      - e2e
      - scale
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          path: artifacts
          merge-multiple: true
      - name: Build PR comment
        run: |
          {
            echo '## holys3 benchmarks'
            echo
            echo '### micro'
            if [ -f artifacts/bench-micro.md ]; then cat artifacts/bench-micro.md; else echo 'micro did not produce a table'; fi
            echo
            echo '### e2e S3'
            if [ -f artifacts/bench-e2e.md ]; then cat artifacts/bench-e2e.md; else echo 'e2e did not produce a table'; fi
            echo
            echo '### scale'
            if [ -f artifacts/bench-scale.md ]; then cat artifacts/bench-scale.md; else echo 'scale did not produce a table'; fi
            echo
            echo '### prose'
            if [ -f artifacts/bench-prose.md ]; then cat artifacts/bench-prose.md; else echo 'prose did not produce a table'; fi
          } > bench-comment.md
      - uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: holys3-benchmarks
          path: bench-comment.md
