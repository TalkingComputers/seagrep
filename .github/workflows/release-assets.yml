name: release assets

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: GitHub release tag
        required: true
        type: string

permissions: {}

jobs:
  release-assets:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false
      - id: upload
        uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6
        with:
          bin: seagrep
          target: ${{ matrix.target }}
          ref: refs/tags/${{ inputs.tag }}
          tar: unix
          zip: windows
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Attest Unix archive
        if: runner.os != 'Windows'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-path: ${{ steps.upload.outputs.tar }}
      - name: Attest Windows archive
        if: runner.os == 'Windows'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-path: ${{ steps.upload.outputs.zip }}
