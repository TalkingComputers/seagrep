name: release-plz

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: {}

jobs:
  # Keeps an open release PR (version bumps + CHANGELOG) up to date.
  release-plz-pr:
    name: release-plz PR
    if: vars.RELEASE_PLZ_PR_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.1
      - name: Run release-plz
        id: release-pr
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - name: Run CI on release branches
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          RELEASE_PRS: ${{ steps.release-pr.outputs.prs }}
        run: |
          jq -r '.[].head_branch' <<< "$RELEASE_PRS" | while read -r branch; do
            gh workflow run ci.yml --ref "$branch"
          done

  verify:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --locked --release --workspace --all-features
      - run: cargo package --locked --workspace

  release-plz-release:
    name: release-plz release
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    environment: crates-io
    outputs:
      releases: ${{ steps.release.outputs.releases }}
      releases_created: ${{ steps.release.outputs.releases_created }}
    permissions:
      contents: write
      id-token: write
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.1
      - name: Run release-plz
        id: release
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-assets:
    if: needs.release-plz-release.outputs.releases_created == 'true'
    needs: release-plz-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - id: upload
        uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1
        with:
          bin: holys3
          target: ${{ matrix.target }}
          ref: refs/tags/${{ fromJSON(needs.release-plz-release.outputs.releases)[0].tag }}
          tar: unix
          zip: windows
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Attest Unix archive
        if: runner.os != 'Windows'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: ${{ steps.upload.outputs.tar }}
      - name: Attest Windows archive
        if: runner.os == 'Windows'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: ${{ steps.upload.outputs.zip }}
