name: fuzz

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      seconds:
        description: "seconds per target"
        default: "900"

permissions: {}

jobs:
  fuzz:
    name: fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: [decode_source]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: fuzz
      - run: cargo install cargo-fuzz --locked
      - name: Run fuzzer
        env:
          FUZZ_SECONDS: ${{ github.event.inputs.seconds || '900' }}
        run: |
          seconds="$FUZZ_SECONDS"
          mkdir -p fuzz/corpus/${{ matrix.target }}
          cp fuzz/seeds/${{ matrix.target }}/* fuzz/corpus/${{ matrix.target }}/
          cargo fuzz run ${{ matrix.target }} -- -max_total_time="$seconds" -timeout=30 -rss_limit_mb=4096
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/
          if-no-files-found: ignore
