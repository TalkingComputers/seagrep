# cargo-deny configuration for the seagrep workspace.
# Validate locally with: cargo deny check
# The license `allow` list below is a starting point covering the licenses
# pulled in by reqwest/rustls/tokio/clap. Run `cargo deny check licenses`
# once and add any license it flags (it prints the exact SPDX id + crate).

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true

[advisories]
# RustSec advisory database. Fail on any unmaintained dep in the workspace
# graph and on unsound advisories.
unmaintained = "workspace"
unsound = "all"
ignore = []

[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "Unlicense",
    # libbz2-rs-sys: the bzip2 library's own BSD-style permissive license
    "bzip2-1.0.6",
]
exceptions = []

[bans]
# Workspaces routinely carry duplicate transitive versions; warn rather than
# block CI. Tighten to "deny" + curated skips once the tree is stable.
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
